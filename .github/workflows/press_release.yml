name: 금융유관기관 보도자료

on:
  schedule:
    - cron: '20 23 * * 0-4'  # 08:20 KST 평일 (UTC 23:20 Sun-Thu)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.json
        env:
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
        run: python make_config.py

      - name: SMTP 연결 진단
        run: |
          python -c "
          import smtplib, json
          with open('config.json') as f:
              cfg = json.load(f)['email']
          host = cfg['smtp_host']
          port = cfg['smtp_port']
          print(f'smtp_host={repr(host)}, port={port}')
          print(f'sender={repr(cfg[\"sender\"])}, recipients={repr(cfg[\"recipients\"])}')
          print(f'password_set={bool(cfg[\"password\"])}')
          for p,ssl in [(465,True),(587,False)]:
              try:
                  s = smtplib.SMTP_SSL(host,p,timeout=10) if ssl else smtplib.SMTP(host,p,timeout=10)
                  s.quit()
                  print(f'port {p}: OK')
              except Exception as e:
                  print(f'port {p}: FAIL -> {e}')
          "

      - name: Run press release report
        run: python press_release_report.py --now
