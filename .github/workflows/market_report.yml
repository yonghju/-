name: 금융시장동향 Daily Report

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 16:00 KST 평일 (UTC 07:00 Mon-Fri)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul          # KST 기준 weekday 체크를 위해

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.json
        env:
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          ECOS_API_KEY:       ${{ secrets.ECOS_API_KEY }}
          NAVER_CLIENT_ID:    ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python make_config.py

      - name: Run market report
        run: python market_report.py --now
